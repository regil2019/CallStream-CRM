openapi: 3.0.0
info:
  title: CRM Engine API (Система Холодных Звонков)
  description: API для управления клиентами, проектами и логами звонков в системе CRM. Разработано для автоматизации холодного обзвона.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
    description: Локальный сервер разработки
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        name: { type: string }
        phone: { type: string }
        role: { type: string, enum: [ADMIN, MANAGER] }
        isVerified: { type: boolean }
    Project:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        status: { type: string }
    Client:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        phone: { type: string }
        company: { type: string }
        inn: { type: string }
        email: { type: string }
        projectId: { type: string }
        status: { type: string, enum: [NEW, IN_PROGRESS, INTERESTED, NOT_INTERESTED, CONVERTED, UNREACHABLE] }
    CallLog:
      type: object
      properties:
        id: { type: string }
        clientId: { type: string }
        userId: { type: string }
        projectId: { type: string }
        status: { type: string }
        result: { type: string }
        timestamp: { type: string, format: date-time }
    SaleScript:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        content: { type: string }
    ObjectionTemplate:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        content: { type: string }

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      summary: Регистрация менеджера
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, phone]
              properties:
                email: { type: string }
                password: { type: string, minLength: 6 }
                phone: { type: string, pattern: '^\+7\d{10}$' }
                name: { type: string }
      responses:
        '201':
          description: Код подтверждения отправлен
  /auth/verify:
    post:
      summary: Подтверждение телефона (SMS код)
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone: { type: string }
                code: { type: string }
      responses:
        '200':
          description: Токен доступа (JWT) возвращен
  /auth/login:
    post:
      summary: Вход в систему
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Успешный вход

  /projects:
    get:
      summary: Получить список проектов
      tags: [Projects]
      responses:
        '200':
          description: Список проектов
    post:
      summary: Создать новый проект
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        '201':
          description: Проект создан

  /clients:
    get:
      summary: Список клиентов
      tags: [Clients]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: name
          in: query
          description: Поиск по имени
          schema: { type: string }
        - name: phone
          in: query
          description: Поиск по номеру телефона
          schema: { type: string }
        - name: projectId
          in: query
          description: Фильтр по ID проекта
          schema: { type: string, format: uuid }
        - name: status
          in: query
          description: Фильтр по статусу
          schema: { type: string, enum: [NEW, IN_PROGRESS, INTERESTED, NOT_INTERESTED, CONVERTED, UNREACHABLE] }
      responses:
        '200':
          description: Список клиентов
    post:
      summary: Добавить клиента
      tags: [Clients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Client'
      responses:
        '201':
          description: Клиент добавлен
  /clients/{id}:
    get:
      summary: Информация о клиенте
      tags: [Clients]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Данные клиента
    patch:
      summary: Обновить клиента
      tags: [Clients]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Client'
      responses:
        '200':
          description: Клиент обновлен
    delete:
      summary: Удалить клиента
      tags: [Clients]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Удалено
  /clients/upload:
    post:
      summary: Массовая загрузка клиентов (Excel/CSV)
      tags: [Clients]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        '200':
          description: Загрузка завершена. Возвращает количество успешных записей и дубликатов.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      successful: { type: integer }
                      duplicates: { type: integer }
                      totalProcessed: { type: integer }

  /calls:
    get:
      summary: История звонков
      tags: [Calls]
      responses:
        '200':
          description: Список звонков
    post:
      summary: Запись о сделанном звонке
      tags: [Calls]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clientId, projectId, status]
              properties:
                clientId: { type: string }
                projectId: { type: string }
                status: { type: string }
                result: { type: string }
      responses:
        '201':
          description: Звонок сохранен

  /uploads:
    post:
      summary: Загрузка файлов (общее)
      tags: [Uploads]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
                projectId: { type: string }
      responses:
        '202':
          description: Файл в очереди

  /stats/calls:
    get:
      summary: Статистика звонков
      tags: [Stats]
      responses:
        '200':
          description: Данные статистики

  /scripts:
    get:
      summary: Список скриптов продаж
      tags: [Scripts]
      responses:
        '200':
          description: Список скриптов
    post:
      summary: Создать скрипт
      tags: [Scripts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaleScript'
      responses:
        '201':
          description: Скрипт создан
  /scripts/{id}:
    patch:
      summary: Обновить скрипт
      tags: [Scripts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaleScript'
      responses:
        '200':
          description: Обновлено
    delete:
      summary: Удалить скрипт
      tags: [Scripts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Удалено

  /templates:
    get:
      summary: Шаблоны ответов на возражения
      tags: [Templates]
      responses:
        '200':
          description: Список шаблонов
    post:
      summary: Создать шаблон
      tags: [Templates]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectionTemplate'
      responses:
        '201':
          description: Шаблон создан
  /templates/{id}:
    patch:
      summary: Обновить шаблон
      tags: [Templates]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Обновлено
    delete:
      summary: Удалить шаблон
      tags: [Templates]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Удалено
